const PAGE = 100;
let filtered = STOCKS;
let sortKey = 's';
let sortDir = -1;
let filterMode = 'all';
let page = 0;

function setFilter(m) {
  filterMode = m;
  ['all','jp','us','buy'].forEach(k => document.getElementById('btn-'+k).classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  page = 0; render();
}
function sort(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  page = 0; render();
}
function fmtMC(mc, jp) {
  if (!mc) return '—';
  if (jp) {
    if (mc >= 1e12) return (mc/1e12).toFixed(1)+'兆';
    return Math.round(mc/1e8)+'億';
  } else {
    if (mc >= 1e12) return '$'+(mc/1e12).toFixed(1)+'T';
    return '$'+(mc/1e9).toFixed(1)+'B';
  }
}
function badge(s) {
  if (s >= 70) return '<span class="badge badge-buy">BUY</span>';
  if (s >= 50) return '<span class="badge badge-watch">WATCH</span>';
  return '<span class="badge badge-caution">CAUTION</span>';
}
function render() {
  const q = document.getElementById('q').value.toLowerCase();
  filtered = STOCKS.filter(r => {
    if (filterMode === 'jp'  && !r.jp) return false;
    if (filterMode === 'us'  &&  r.jp) return false;
    if (filterMode === 'buy' && r.s < 70) return false;
    if (q && !r.t.toLowerCase().includes(q) && !r.n.toLowerCase().includes(q)
           && !(r.sec||'').toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a,b) => {
    const av = a[sortKey] ?? -Infinity;
    const bv = b[sortKey] ?? -Infinity;
    return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
  });
  // ヘッダークラス更新
  document.querySelectorAll('.all-table th[id]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.id === 'h-'+sortKey) th.classList.add(sortDir > 0 ? 'sort-asc' : 'sort-desc');
  });
  // 統計
  const buy = filtered.filter(r => r.s >= 70).length;
  document.getElementById('stats').innerHTML =
    `<span>表示: <span class="all-count">${filtered.length}</span>銘柄</span>` +
    `<span>BUY判定: <span class="all-count">${buy}</span>銘柄</span>`;
  // テーブル本体
  const slice = filtered.slice(page*PAGE, (page+1)*PAGE);
  const rows = slice.map((r,i) => {
    const rank = page*PAGE + i + 1;
    const yf = r.jp ? `https://finance.yahoo.co.jp/quote/${r.t}`
                    : `https://finance.yahoo.com/quote/${r.t}`;
    const dt = r.jp ? r.t.slice(0, -2) : r.t;  // .T 非表示
    const per = r.per != null ? r.per.toFixed(1) : '—';
    const pbr = r.pbr != null ? r.pbr.toFixed(2) : '—';
    const roe = r.roe != null ? r.roe.toFixed(1)+'%' : '—';
    const div = r.div ? r.div.toFixed(2)+'%' : '—';
    const p1m = r.p1m != null ? (r.p1m>0?'+':'')+r.p1m.toFixed(1)+'%' : '—';
    const p1mcls = r.p1m > 0 ? 'up' : r.p1m < 0 ? 'dn' : '';
    return `<tr>
      <td><span style="font-weight:900">${r.s}</span> ${badge(r.s)}</td>
      <td>${r.f}</td>
      <td><a href="${yf}" target="_blank" rel="noopener">${dt}</a></td>
      <td>${r.n}</td>
      <td>${per}</td><td>${pbr}</td><td>${roe}</td>
      <td>${div}</td>
      <td class="${p1mcls}">${p1m}</td>
      <td>${fmtMC(r.mc, r.jp)}</td>
      <td>${r.sec||'—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML = rows || '<tr><td colspan="11" style="text-align:center;color:var(--text-sub);">該当銘柄なし</td></tr>';
  // ページネーション（前へ / ページ情報 / 次へ）
  const total = Math.ceil(filtered.length / PAGE);
  let pager = '';
  if (page > 0)
    pager += `<button class="all-page-btn" onclick="goPage(${page-1})">← 前へ</button>`;
  if (total > 0)
    pager += `<span style="font-size:.82rem;color:var(--text-sub);padding:.3rem .6rem;">${filtered.length}件 — ${page+1} / ${total}ページ</span>`;
  if (page < total - 1)
    pager += `<button class="all-page-btn" onclick="goPage(${page+1})">次へ →</button>`;
  document.getElementById('pager').innerHTML = pager;
}
function goPage(n) { page = n; render(); window.scrollTo(0,0); }
render();
